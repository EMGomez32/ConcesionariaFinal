name: CI

# Corre en cada push y pull request. Compila y typechequea backend y frontend
# ANTES de que el código llegue a la Raspberry — caza errores de TypeScript,
# imports mal ubicados y builds rotos, que son el tipo de fallo que tira abajo
# el arranque en el server.
on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (typecheck + build)
    runs-on: ubuntu-latest
    env:
      # Dummy: prisma generate lee el datasource del schema pero NO se conecta.
      # El build (tsc) no toca la base. La validación de env (zod) es en runtime.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?sslmode=disable
    defaults:
      run:
        working-directory: BackConcesionaria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: BackConcesionaria/package-lock.json
      - run: npm ci
      - name: Generar cliente Prisma
        run: npx prisma generate
      - name: Typecheck + build (tsc)
        run: npm run build
      # Los tests NO se corren acá todavía: hoy dependen de un servidor levantado
      # y de datos sembrados a mano, así que en CI darían rojo sin proteger nada.
      # Se reactivan cuando la suite sea reproducible con factories + DB efímera
      # (backlog: US-61). Ver el plan de Scrum.

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontConcesionaria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: FrontConcesionaria/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Typecheck + build (tsc + vite build)
        run: npm run build
