name: CI

# Corre en cada push y pull request: compila backend y frontend y corre los
# tests del backend. Sirve para cazar errores (TS, imports mal ubicados, etc.)
# ANTES de subir a la Raspberry — el tipo de fallo que rompe el build en el server.
on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: concesionaria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/concesionaria_test?sslmode=disable
      JWT_SECRET: ci_test_secret_key_change_me_123456
      JWT_REFRESH_SECRET: ci_test_refresh_key_change_me_654321
      NODE_ENV: test
    defaults:
      run:
        working-directory: BackConcesionaria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: BackConcesionaria/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Compilar (tsc)
        run: npm run build
      - name: Aplicar schema a la base de test
        run: npx prisma db push
      - name: Tests
        run: npm test --if-present

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontConcesionaria
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: FrontConcesionaria/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Compilar (tsc + vite build)
        run: npm run build
