# nginx.conf custom para el frontend (SPA Vite + security headers)
# Versión "dev-friendly": HSTS sin preload, CSP que tolera el bundle de Vite,
# bloqueo de features del browser no usadas.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ─────────────────────────────────────────────────────

    # Forzar HTTPS futuro: 1 año, incluir subdominios. Sin preload para no
    # quedar atado al registro global de browsers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # No permitir embed en iframes de otros dominios (anti-clickjacking).
    add_header X-Frame-Options "SAMEORIGIN" always;

    # No sniff de MIME types — un .txt no se ejecuta como JS aunque parezca.
    add_header X-Content-Type-Options "nosniff" always;

    # No leak del path completo a otros dominios al hacer click en links externos.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear features que la app no necesita.
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;

    # CSP — permisiva, compatible con Vite/React (que inyecta styles inline).
    # La API y los uploads se sirven same-origin vía proxy (/api, /uploads),
    # así que alcanza con 'self'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Aislamiento del browser.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # nginx NO hereda add_header del server cuando el location tiene los suyos,
    # así que repetimos TODA la lista de security headers en cada location que
    # los necesite.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # Assets versionados de Vite — cache largo (su nombre incluye hash).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # Proxy al backend — mismo origen para el browser, así no hay CORS ni
    # hace falta exponer el puerto 3000 en el tunnel. "backend" resuelve por
    # el DNS interno de docker compose.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # IP real del visitante detrás del Cloudflare Tunnel. La app la prioriza
        # para auditoría y rate limiting; explícito para no depender del passthrough.
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Archivos subidos (fotos/documentos) que sirve el backend.
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — toda ruta desconocida cae a index.html para que React
    # Router maneje el routing client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Esconder versión de nginx en headers/error pages.
    server_tokens off;

    # Tamaño máximo de upload coherente con multer del backend (25 MB).
    client_max_body_size 25m;
}
